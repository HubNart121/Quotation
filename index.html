<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Quote - ระบบจัดการใบเสนอราคา</title>
    
    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; }
            .print-area { box-shadow: none !important; border: none !important; margin: 0 !important; width: 100% !important; border-radius: 0 !important; }
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Configuration ---
        // เมื่อนำไปรันบน GitHub คุณสามารถนำ Firebase Config ของคุณมาใส่ที่นี่ได้
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const appId = window.__app_id || 'quotation-manager-default';

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Icon Helper Component
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('LIST');
            const [quotes, setQuotes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentQuote, setCurrentQuote] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            // 1. Auth
            useEffect(() => {
                const initAuth = async () => {
                    const token = window.__initial_auth_token;
                    if (token) {
                        await auth.signInWithCustomToken(token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                return auth.onAuthStateChanged(setUser);
            }, []);

            // 2. Data Fetching
            useEffect(() => {
                if (!user) return;
                const quotesRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('quotations');
                
                const unsubscribe = quotesRef.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setQuotes(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                    setLoading(false);
                }, (err) => {
                    console.error(err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            // Handlers
            const handleCreateNew = () => {
                const newId = `QT-${Date.now()}`;
                setCurrentQuote({
                    id: newId,
                    quoteNumber: `QT-${new Date().getFullYear()}-${String(quotes.length + 1).padStart(3, '0')}`,
                    date: new Date().toISOString().split('T')[0],
                    from: '', to: '', notes: '', vatRate: 7,
                    items: [{ description: '', quantity: 1, price: 0 }]
                });
                setView('EDIT');
            };

            const handleSave = async () => {
                if (!user || !currentQuote) return;
                try {
                    const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('quotations').doc(currentQuote.id);
                    await docRef.set({
                        ...currentQuote,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        createdAt: currentQuote.createdAt || firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setView('LIST');
                } catch (e) { console.error(e); }
            };

            const handleDelete = async (id) => {
                if (!confirm('ยืนยันการลบใบเสนอราคานี้?')) return;
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('quotations').doc(id).delete();
            };

            const updateItem = (index, field, value) => {
                const newItems = [...currentQuote.items];
                newItems[index][field] = (field === 'quantity' || field === 'price') ? (value === '' ? 0 : parseFloat(value)) : value;
                setCurrentQuote({ ...currentQuote, items: newItems });
            };

            const totals = useMemo(() => {
                if (!currentQuote) return { subTotal: 0, vatAmount: 0, grandTotal: 0 };
                const subTotal = currentQuote.items.reduce((s, i) => s + (i.quantity * i.price), 0);
                const vatAmount = subTotal * (currentQuote.vatRate / 100);
                return { subTotal, vatAmount, grandTotal: subTotal + vatAmount };
            }, [currentQuote]);

            const formatCurrency = (val) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' }).format(val);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center text-blue-600 font-bold">
                    <div className="animate-spin mr-2">⏳</div> กำลังโหลด...
                </div>
            );

            return (
                <div className="min-h-screen">
                    <header className="bg-white border-b h-16 flex items-center justify-between px-6 no-print">
                        <div className="flex items-center gap-2 font-bold text-xl text-blue-700">
                            <Icon name="calculator" /> <span>Smart Quote</span>
                        </div>
                        {user && <div className="text-[10px] text-slate-400 bg-slate-100 px-2 py-1 rounded">User: {user.uid}</div>}
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8">
                        {view === 'LIST' ? (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-bold flex items-center gap-2"><Icon name="file-text" className="text-blue-600" /> ใบเสนอราคา</h2>
                                    <button onClick={handleCreateNew} className="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg flex items-center gap-2 transition-transform active:scale-95">
                                        <Icon name="plus" /> สร้างใหม่
                                    </button>
                                </div>
                                <div className="bg-white p-3 rounded-2xl border flex items-center gap-3 px-4 shadow-sm">
                                    <Icon name="search" className="text-slate-400" />
                                    <input type="text" placeholder="ค้นหาเลขที่ หรือ ชื่อลูกค้า..." className="flex-1 outline-none" onChange={e => setSearchTerm(e.target.value)} />
                                </div>
                                <div className="bg-white rounded-2xl border overflow-hidden shadow-sm">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 border-b">
                                            <tr className="text-slate-500 text-sm">
                                                <th className="px-6 py-4">เลขที่ / วันที่</th>
                                                <th className="px-6 py-4">ลูกค้า</th>
                                                <th className="px-6 py-4 text-right">ยอดสุทธิ</th>
                                                <th className="px-6 py-4 text-center">จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {quotes.filter(q => q.quoteNumber.includes(searchTerm) || q.to.includes(searchTerm)).map(q => (
                                                <tr key={q.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-6 py-4 font-bold">{q.quoteNumber}<div className="text-[10px] text-slate-400 font-normal">{q.date}</div></td>
                                                    <td className="px-6 py-4 text-slate-600">{q.to || '-'}</td>
                                                    <td className="px-6 py-4 text-right font-bold text-blue-700">
                                                        {formatCurrency(q.items.reduce((s, i) => s + (i.quantity * i.price), 0) * (1 + q.vatRate/100))}
                                                    </td>
                                                    <td className="px-6 py-4 flex justify-center gap-2">
                                                        <button onClick={() => { setCurrentQuote(q); setView('EDIT'); }} className="p-2 hover:bg-blue-50 text-blue-600 rounded-lg"><Icon name="chevron-right" /></button>
                                                        <button onClick={() => handleDelete(q.id)} className="p-2 hover:bg-red-50 text-red-500 rounded-lg"><Icon name="trash-2" /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center no-print">
                                    <button onClick={() => setView('LIST')} className="flex items-center gap-2 text-slate-500 font-bold"><Icon name="arrow-left" /> ย้อนกลับ</button>
                                    <div className="flex gap-3">
                                        <button onClick={() => window.print()} className="px-4 py-2 border rounded-xl flex items-center gap-2 hover:bg-white"><Icon name="printer" /> พิมพ์</button>
                                        <button onClick={handleSave} className="px-6 py-2 bg-blue-600 text-white rounded-xl font-bold shadow-lg flex items-center gap-2"><Icon name="save" /> บันทึก</button>
                                    </div>
                                </div>

                                <div className="bg-white shadow-2xl rounded-3xl overflow-hidden print-area border">
                                    <div className="p-10 bg-slate-900 text-white flex justify-between items-start">
                                        <div>
                                            <h1 className="text-5xl font-black">ใบเสนอราคา</h1>
                                            <p className="text-slate-400 tracking-[0.3em] text-[10px] font-bold mt-2">OFFICIAL QUOTATION</p>
                                        </div>
                                        <div className="text-right space-y-4">
                                            <div className="border-b border-slate-700 pb-1">
                                                <label className="text-[10px] text-slate-500 font-bold block">เลขที่เอกสาร</label>
                                                <input className="bg-transparent outline-none font-bold text-white text-right" value={currentQuote.quoteNumber} onChange={e => setCurrentQuote({...currentQuote, quoteNumber: e.target.value})} />
                                            </div>
                                            <div className="border-b border-slate-700 pb-1">
                                                <label className="text-[10px] text-slate-500 font-bold block">วันที่</label>
                                                <input type="date" className="bg-transparent outline-none text-white text-right" value={currentQuote.date} onChange={e => setCurrentQuote({...currentQuote, date: e.target.value})} />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="p-10 space-y-10">
                                        <div className="grid grid-cols-2 gap-16">
                                            <div className="space-y-2">
                                                <span className="text-blue-600 font-black text-xs border-b-2 border-blue-600 pb-1">จากผู้เสนอราคา</span>
                                                <textarea rows="4" className="w-full p-4 bg-slate-50 rounded-2xl outline-none text-sm" value={currentQuote.from} onChange={e => setCurrentQuote({...currentQuote, from: e.target.value})} placeholder="ข้อมูลบริษัทของคุณ..." />
                                            </div>
                                            <div className="space-y-2">
                                                <span className="text-slate-800 font-black text-xs border-b-2 border-slate-800 pb-1">ถึงลูกค้า</span>
                                                <textarea rows="4" className="w-full p-4 bg-slate-50 rounded-2xl outline-none text-sm" value={currentQuote.to} onChange={e => setCurrentQuote({...currentQuote, to: e.target.value})} placeholder="ข้อมูลลูกค้า..." />
                                            </div>
                                        </div>

                                        <div className="border rounded-2xl overflow-hidden">
                                            <table className="w-full">
                                                <thead className="bg-slate-800 text-white text-[10px] uppercase">
                                                    <tr>
                                                        <th className="px-4 py-3 text-left w-12">#</th>
                                                        <th className="px-4 py-3 text-left">รายการ</th>
                                                        <th className="px-4 py-3 text-right w-24">จำนวน</th>
                                                        <th className="px-4 py-3 text-right w-32">ราคา/หน่วย</th>
                                                        <th className="px-4 py-3 text-right w-32">รวมเงิน</th>
                                                        <th className="px-4 py-3 w-10 no-print"></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y">
                                                    {currentQuote.items.map((item, idx) => (
                                                        <tr key={idx} className="group hover:bg-slate-50">
                                                            <td className="px-4 py-3 text-slate-300 text-xs font-bold">{idx + 1}</td>
                                                            <td><input className="w-full p-3 bg-transparent outline-none text-sm" value={item.description} onChange={e => updateItem(idx, 'description', e.target.value)} placeholder="รายการ..." /></td>
                                                            <td><input type="number" className="w-full p-3 text-right bg-transparent outline-none font-bold" value={item.quantity || ''} onChange={e => updateItem(idx, 'quantity', e.target.value)} placeholder="0" /></td>
                                                            <td><div className="flex items-center px-3"><span className="text-slate-400 text-xs mr-1">฿</span><input type="number" className="w-full py-3 text-right bg-transparent outline-none font-bold" value={item.price || ''} onChange={e => updateItem(idx, 'price', e.target.value)} placeholder="0.00" /></div></td>
                                                            <td className="px-4 py-3 text-right font-black text-slate-900 bg-slate-50/50">{formatCurrency(item.quantity * item.price)}</td>
                                                            <td className="no-print text-center"><button onClick={() => removeItem(idx)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" className="w-4 h-4" /></button></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                            <div className="p-3 bg-slate-50 no-print border-t"><button onClick={addItem} className="text-xs text-blue-600 font-bold flex items-center gap-1"><Icon name="plus-circle" className="w-4 h-4" /> เพิ่มรายการ</button></div>
                                        </div>

                                        <div className="flex flex-col md:flex-row gap-10 justify-between">
                                            <div className="md:w-1/2 space-y-2">
                                                <div className="flex justify-between items-center"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">หมายเหตุ:</span> <button onClick={() => setCurrentQuote({...currentQuote, notes: ''})} className="text-[9px] text-red-400 no-print">ล้าง</button></div>
                                                <textarea rows="3" className="w-full p-4 bg-slate-50 rounded-2xl outline-none text-xs italic" value={currentQuote.notes} onChange={e => setCurrentQuote({...currentQuote, notes: e.target.value})} placeholder="เงื่อนไขการวางเงิน..." />
                                            </div>
                                            <div className="md:w-5/12 space-y-2 text-sm">
                                                <div className="flex justify-between border-b py-2 text-slate-500"><span>รวมเป็นเงิน</span><span className="font-bold text-slate-800">{formatCurrency(totals.subTotal)}</span></div>
                                                <div className="flex justify-between border-b py-2 text-slate-500"><div className="flex items-center gap-1">VAT <input type="number" className="w-8 text-center bg-slate-100 rounded text-xs no-print" value={currentQuote.vatRate} onChange={e => setCurrentQuote({...currentQuote, vatRate: parseFloat(e.target.value)||0})} /> %</div><span className="font-bold text-slate-800">{formatCurrency(totals.vatAmount)}</span></div>
                                                <div className="flex justify-between items-center bg-blue-600 text-white p-5 rounded-2xl shadow-xl shadow-blue-100 mt-4">
                                                    <div><div className="text-[10px] font-black uppercase tracking-widest opacity-70">ยอดรวมทั้งสิ้น</div><div className="text-[9px] opacity-50">GRAND TOTAL</div></div>
                                                    <div className="text-3xl font-black">{formatCurrency(totals.grandTotal)}</div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-20 grid grid-cols-2 gap-20 text-center pb-10">
                                            <div className="space-y-6">
                                                <div className="border-b-2 h-10 w-full max-w-[200px] mx-auto"></div>
                                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Authorized Customer Signature</div>
                                            </div>
                                            <div className="space-y-6">
                                                <div className="border-b-2 h-10 w-full max-w-[200px] mx-auto"></div>
                                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Authorized Seller Signature</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
